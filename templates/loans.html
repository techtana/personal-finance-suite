{% extends "base.html" %}

{% block title %}Liabilities - Personal Finance Suite{% endblock %}
{% block page_title %}Liabilities{% endblock %}

{% block content %}
<div x-data="loansPage()" x-init="init()" class="space-y-6">

    <div class="flex justify-between items-center">
        <h3 class="text-lg font-semibold text-gray-900">Liabilities</h3>
        <button @click="openAdd()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">+ Add Liability</button>
    </div>

    <div x-show="loading" class="text-center py-12 text-gray-500">Loading...</div>

    <template x-if="!loading">
        <div class="space-y-6">

            <!-- Summary -->
            <div class="bg-white rounded-lg shadow p-6 grid grid-cols-3 gap-4 text-center">
                <div>
                    <p class="text-sm text-gray-500">Total Debt</p>
                    <p class="text-2xl font-bold text-red-600" x-text="fmt(totalDebt)"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500">Monthly Payments</p>
                    <p class="text-2xl font-bold text-gray-900" x-text="fmt(totalMonthlyPayment)"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500">Loans</p>
                    <p class="text-2xl font-bold text-gray-900" x-text="loans.length"></p>
                </div>
            </div>

            <!-- Empty state -->
            <template x-if="loans.length === 0">
                <div class="bg-white rounded-lg shadow p-12 text-center text-gray-400">
                    <p class="text-lg mb-2">No loans yet</p>
                    <button @click="openAdd()" class="text-blue-600 hover:underline text-sm">Add a loan</button>
                </div>
            </template>

            <!-- Loans grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <template x-for="l in loans" :key="l.id">
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="text-lg font-semibold text-gray-900" x-text="l.name"></h4>
                                <p class="text-sm text-gray-500" x-text="l.institution + ' · ' + l.type"></p>
                            </div>
                        </div>

                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-500">Current Balance</span>
                                <span class="font-bold text-lg" x-text="fmt(l.current_balance)"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-500">Original Balance</span>
                                <span x-text="fmt(l.original_balance)"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-500">Interest Rate</span>
                                <span x-text="(l.interest_rate / 100).toFixed(3) + '%'"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-500">Monthly Payment</span>
                                <span class="font-semibold text-red-600" x-text="'−' + fmt(l.monthly_payment)"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-500">Payoff Date</span>
                                <span x-text="l.payoff_date"></span>
                            </div>
                        </div>

                        <!-- Amortization progress -->
                        <div class="mt-4">
                            <div class="flex justify-between text-xs text-gray-500 mb-1">
                                <span>Progress</span>
                                <span x-text="paidPct(l) + '% paid'"></span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-blue-500 h-2 rounded-full" :style="'width:' + paidPct(l) + '%'"></div>
                            </div>
                        </div>

                        <p x-show="l.note" class="text-xs text-gray-500 mt-3 italic" x-text="l.note"></p>

                        <div class="mt-4 flex space-x-2">
                            <button @click="openEdit(l)" class="flex-1 px-3 py-2 bg-blue-50 text-blue-600 rounded text-sm font-medium hover:bg-blue-100">Edit</button>
                            <button @click="openHistory(l)" class="px-3 py-2 bg-green-50 text-green-700 rounded text-sm font-medium hover:bg-green-100">History</button>
                            <button @click="deleteLoan(l.id)" class="px-3 py-2 bg-red-50 text-red-600 rounded text-sm font-medium hover:bg-red-100">Delete</button>
                        </div>
                    </div>
                </template>
            </div>

        </div>
    </template>

    <!-- ── Add/Edit Loan Modal ───────────────────────────────────────────── -->
    <div x-show="showModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50" @click.self="showModal = false">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-lg mx-4 p-6 max-h-screen overflow-y-auto">
            <h3 class="text-lg font-semibold text-gray-900 mb-4" x-text="editingId ? 'Edit Loan' : 'Add Loan'"></h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input x-model="form.name" type="text" placeholder="e.g. Primary Mortgage" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
                        <select x-model="form.type" class="w-full px-3 py-2 border rounded-lg text-sm bg-white">
                            <option value="mortgage">Mortgage</option>
                            <option value="auto">Auto</option>
                            <option value="student">Student</option>
                            <option value="personal">Personal</option>
                            <option value="heloc">HELOC</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Institution</label>
                        <input x-model="form.institution" type="text" placeholder="e.g. Chase" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Original Balance ($)</label>
                        <input x-model="form.original_balance_dollars" type="number" step="0.01" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Current Balance ($)</label>
                        <input x-model="form.current_balance_dollars" type="number" step="0.01" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Interest Rate (%)</label>
                        <input x-model="form.rate_pct" type="number" step="0.001" placeholder="6.875" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Monthly Payment ($)</label>
                        <input x-model="form.monthly_payment_dollars" type="number" step="0.01" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
                        <input x-model="form.start_date" type="date" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Payoff Date</label>
                        <input x-model="form.payoff_date" type="date" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Note (optional)</label>
                    <input x-model="form.note" type="text" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
            </div>
            <div class="mt-6 flex space-x-3 justify-end">
                <button @click="showModal = false" class="px-4 py-2 text-gray-600 hover:text-gray-900">Cancel</button>
                <button @click="save()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Save</button>
            </div>
        </div>
    </div>

    <!-- ── Balance History Modal ─────────────────────────────────────────── -->
    <div x-show="showHistoryModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50" @click.self="closeHistory()">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 flex flex-col" style="max-height:90vh">
            <div class="flex justify-between items-center p-5 border-b">
                <div>
                    <h3 class="text-base font-semibold text-gray-900" x-text="'Balance History · ' + (historyLoan?.name || '')"></h3>
                    <p class="text-xs text-gray-400 mt-0.5" x-text="(loanSnapshots[historyLoan?.id] || []).length + ' recorded snapshots'"></p>
                </div>
                <button @click="openSnapForm()" x-show="!showSnapForm"
                        class="px-3 py-1.5 bg-green-600 text-white rounded-lg text-xs font-medium hover:bg-green-700">
                    + Record Balance
                </button>
            </div>

            <div x-show="(loanSnapshots[historyLoan?.id] || []).length >= 2" class="px-5 pt-4">
                <canvas id="loanHistoryChart" height="60"></canvas>
            </div>

            <div x-show="showSnapForm" class="mx-5 mt-4 bg-gray-50 rounded-lg p-4 border border-gray-200">
                <h4 class="text-xs font-semibold text-gray-700 mb-3" x-text="editingSnapId ? 'Edit Snapshot' : 'Record Balance'"></h4>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Date</label>
                        <input x-model="snapForm.date" type="date" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Balance ($)</label>
                        <input x-model="snapForm.value_dollars" type="number" step="0.01" placeholder="0.00" class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="block text-xs font-medium text-gray-600 mb-1">Note (optional)</label>
                    <input x-model="snapForm.note" type="text" placeholder="e.g. after extra payment" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div class="mb-3 flex items-center gap-2" x-show="!editingSnapId">
                    <input x-model="snapForm.updateLoan" type="checkbox" id="updateLoanCb" class="rounded">
                    <label for="updateLoanCb" class="text-xs text-gray-600">Also update loan's current balance</label>
                </div>
                <div class="flex space-x-2">
                    <button @click="showSnapForm = false; editingSnapId = null" class="px-3 py-1.5 text-gray-500 text-xs hover:text-gray-700">Cancel</button>
                    <button @click="saveSnapshot()" class="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-xs font-medium hover:bg-blue-700">Save</button>
                </div>
            </div>

            <div class="overflow-y-auto flex-1 px-5 py-3">
                <template x-if="(loanSnapshots[historyLoan?.id] || []).length === 0">
                    <p class="text-center text-gray-400 text-sm py-6">No snapshots yet. Record the first balance.</p>
                </template>
                <div class="space-y-2">
                    <template x-for="s in loanSnapshots[historyLoan?.id] || []" :key="s.id">
                        <div class="flex items-center justify-between py-2.5 border-b border-gray-50 last:border-0">
                            <div class="flex-1">
                                <div class="flex items-center gap-3">
                                    <span class="text-sm font-medium text-gray-900" x-text="fmt(s.value)"></span>
                                    <template x-if="loanSnapDelta(historyLoan?.id, s.id) !== null">
                                        <span class="text-xs font-medium px-1.5 py-0.5 rounded"
                                              :class="loanSnapDelta(historyLoan?.id, s.id) <= 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'"
                                              x-text="(loanSnapDelta(historyLoan?.id, s.id) > 0 ? '+' : '') + fmt(loanSnapDelta(historyLoan?.id, s.id))"></span>
                                    </template>
                                </div>
                                <p class="text-xs text-gray-400 mt-0.5" x-text="s.date + (s.note ? ' · ' + s.note : '')"></p>
                            </div>
                            <div class="flex space-x-1">
                                <button @click="openEditSnap(s)" class="px-2 py-1 text-xs text-blue-600 hover:bg-blue-50 rounded">Edit</button>
                                <button @click="deleteSnapshot(s)" class="px-2 py-1 text-xs text-red-500 hover:bg-red-50 rounded">Del</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="p-4 border-t">
                <button @click="closeHistory()" class="w-full px-4 py-2 text-gray-600 hover:text-gray-900 text-sm">Close</button>
            </div>
        </div>
    </div>

</div>

<script>
function loansPage() {
    return {
        loans: [],
        loanSnapshots: {},
        loading: true,
        showModal: false,
        editingId: null,
        form: {},

        showHistoryModal: false,
        historyLoan: null,
        showSnapForm: false,
        editingSnapId: null,
        snapForm: {},
        historyChartInstance: null,

        get totalDebt() { return this.loans.reduce((s, l) => s + l.current_balance, 0); },
        get totalMonthlyPayment() { return this.loans.reduce((s, l) => s + l.monthly_payment, 0); },

        fmt(cents) { return formatCurrency(cents); },

        paidPct(l) {
            if (!l.original_balance) return 0;
            const paid = l.original_balance - l.current_balance;
            return Math.max(0, Math.min(100, Math.round((paid / l.original_balance) * 100)));
        },

        async init() {
            try {
                this.loans = await API.get('/loans');
                const results = await Promise.all(
                    this.loans.map(l => API.get(`/snapshots?entity_type=liability&entity_id=${l.id}`)
                        .then(snaps => ({ id: l.id, snaps }))
                        .catch(() => ({ id: l.id, snaps: [] }))
                    )
                );
                this.loanSnapshots = Object.fromEntries(results.map(r => [r.id, r.snaps]));
            } catch (e) {
                showAlert('Failed to load: ' + e.message, 'error');
            } finally {
                this.loading = false;
            }
        },

        // ── Balance History ──────────────────────────────────────────────

        loanSnapDelta(loanId, snapId) {
            const snaps = [...(this.loanSnapshots[loanId] || [])].sort((a, b) => a.date.localeCompare(b.date));
            const idx = snaps.findIndex(s => s.id === snapId);
            if (idx <= 0) return null;
            return snaps[idx].value - snaps[idx - 1].value;
        },

        async openHistory(l) {
            this.historyLoan = l;
            this.showSnapForm = false;
            this.editingSnapId = null;
            this.showHistoryModal = true;
            try {
                const snaps = await API.get(`/snapshots?entity_type=liability&entity_id=${l.id}`);
                this.loanSnapshots = { ...this.loanSnapshots, [l.id]: snaps };
            } catch (_) {}
            await this.$nextTick();
            this.renderHistoryChart();
        },

        closeHistory() {
            if (this.historyChartInstance) { this.historyChartInstance.destroy(); this.historyChartInstance = null; }
            this.showHistoryModal = false;
            this.historyLoan = null;
        },

        renderHistoryChart() {
            const canvas = document.getElementById('loanHistoryChart');
            if (!canvas || !this.historyLoan) return;
            if (this.historyChartInstance) this.historyChartInstance.destroy();
            const snaps = [...(this.loanSnapshots[this.historyLoan.id] || [])].sort((a, b) => a.date.localeCompare(b.date));
            if (snaps.length < 2) return;
            this.historyChartInstance = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: snaps.map(s => s.date),
                    datasets: [{
                        data: snaps.map(s => s.value / 100),
                        borderColor: '#dc2626',
                        backgroundColor: 'rgba(220,38,38,0.08)',
                        tension: 0.2, fill: true, borderWidth: 2, pointRadius: 3,
                    }],
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0)+'K' : v), font: { size: 10 } } },
                        x: { ticks: { font: { size: 9 }, maxTicksLimit: 6 } },
                    },
                },
            });
        },

        openSnapForm() {
            this.editingSnapId = null;
            this.snapForm = {
                date: new Date().toISOString().split('T')[0],
                value_dollars: this.historyLoan ? (this.historyLoan.current_balance / 100).toFixed(2) : '',
                note: '',
                updateLoan: true,
            };
            this.showSnapForm = true;
        },

        openEditSnap(s) {
            this.editingSnapId = s.id;
            this.snapForm = {
                date: s.date,
                value_dollars: (s.value / 100).toFixed(2),
                note: s.note || '',
                updateLoan: false,
            };
            this.showSnapForm = true;
        },

        async saveSnapshot() {
            const value = Math.round(parseFloat(this.snapForm.value_dollars || 0) * 100);
            try {
                if (this.editingSnapId) {
                    await API.patch(`/snapshots/${this.editingSnapId}`, {
                        date: this.snapForm.date, value, note: this.snapForm.note || null,
                    });
                } else {
                    await API.post('/snapshots', {
                        entity_type: 'liability',
                        entity_id: this.historyLoan.id,
                        date: this.snapForm.date,
                        value,
                        note: this.snapForm.note || null,
                    });
                    if (this.snapForm.updateLoan) {
                        await API.patch(`/loans/${this.historyLoan.id}`, {
                            current_balance: value,
                            last_updated_date: this.snapForm.date,
                        });
                        const loan = this.loans.find(l => l.id === this.historyLoan.id);
                        if (loan) loan.current_balance = value;
                        this.historyLoan = { ...this.historyLoan, current_balance: value };
                    }
                }
                showAlert('Snapshot saved', 'success');
                this.showSnapForm = false;
                this.editingSnapId = null;
                const snaps = await API.get(`/snapshots?entity_type=liability&entity_id=${this.historyLoan.id}`);
                this.loanSnapshots = { ...this.loanSnapshots, [this.historyLoan.id]: snaps };
                await this.$nextTick();
                this.renderHistoryChart();
            } catch (e) {
                showAlert('Error: ' + e.message, 'error');
            }
        },

        async deleteSnapshot(s) {
            if (!confirm('Delete this snapshot?')) return;
            try {
                await API.delete(`/snapshots/${s.id}`);
                showAlert('Snapshot deleted', 'success');
                const snaps = await API.get(`/snapshots?entity_type=liability&entity_id=${this.historyLoan.id}`);
                this.loanSnapshots = { ...this.loanSnapshots, [this.historyLoan.id]: snaps };
                await this.$nextTick();
                this.renderHistoryChart();
            } catch (e) {
                showAlert('Error: ' + e.message, 'error');
            }
        },

        // ── Loan CRUD ────────────────────────────────────────────────────

        openAdd() {
            this.editingId = null;
            this.form = {
                name: '', type: 'mortgage', institution: '',
                original_balance_dollars: '', current_balance_dollars: '',
                rate_pct: '', monthly_payment_dollars: '',
                start_date: '', payoff_date: '', note: '',
            };
            this.showModal = true;
        },

        openEdit(l) {
            this.editingId = l.id;
            this.form = {
                name: l.name, type: l.type, institution: l.institution,
                original_balance_dollars: (l.original_balance / 100).toFixed(2),
                current_balance_dollars: (l.current_balance / 100).toFixed(2),
                rate_pct: (l.interest_rate / 100).toFixed(3),
                monthly_payment_dollars: (l.monthly_payment / 100).toFixed(2),
                start_date: l.start_date, payoff_date: l.payoff_date, note: l.note || '',
            };
            this.showModal = true;
        },

        async save() {
            const payload = {
                name: this.form.name,
                type: this.form.type,
                institution: this.form.institution,
                original_balance: Math.round(parseFloat(this.form.original_balance_dollars || 0) * 100),
                current_balance: Math.round(parseFloat(this.form.current_balance_dollars || 0) * 100),
                interest_rate: Math.round(parseFloat(this.form.rate_pct || 0) * 100),
                monthly_payment: Math.round(parseFloat(this.form.monthly_payment_dollars || 0) * 100),
                start_date: this.form.start_date,
                payoff_date: this.form.payoff_date,
                last_updated_date: new Date().toISOString().split('T')[0],
                note: this.form.note || null,
            };
            try {
                if (this.editingId) {
                    await API.patch('/loans/' + this.editingId, payload);
                    showAlert('Loan updated', 'success');
                } else {
                    await API.post('/loans', payload);
                    showAlert('Loan added', 'success');
                }
                this.showModal = false;
                await this.init();
            } catch (e) {
                showAlert('Error: ' + e.message, 'error');
            }
        },

        async deleteLoan(id) {
            if (!confirm('Delete this loan?')) return;
            try {
                await API.delete('/loans/' + id);
                showAlert('Loan deleted', 'success');
                await this.init();
            } catch (e) {
                showAlert('Error: ' + e.message, 'error');
            }
        },
    };
}
</script>
{% endblock %}
